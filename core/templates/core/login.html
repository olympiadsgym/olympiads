<!DOCTYPE html>
<html lang="en" data-theme="">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>OLYMPIADS - Admin Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/main.css' %}">
  <script>(function(){var t=localStorage.getItem('olympiads_theme')||'';document.documentElement.setAttribute('data-theme',t);})();</script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    .login-body {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      position: relative;
      font-family: 'Poppins', sans-serif;
      overflow: hidden;
    }

    .login-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    .login-bg img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      opacity: 0;
      transition: opacity 1.4s ease-in-out;
      will-change: opacity;
    }

    .login-bg img.active {
      opacity: 1;
    }

    .login-bg-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.52);
      z-index: 1;
    }

    .login-container {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 420px;
    }

    .login-card {
      background: rgba(10, 20, 40, 0.35) !important;
      backdrop-filter: blur(20px) saturate(160%) !important;
      -webkit-backdrop-filter: blur(20px) saturate(160%) !important;
      border: 1px solid rgba(255, 255, 255, 0.15) !important;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.60) !important;
      border-radius: 16px !important;
      padding: 40px 36px !important;
    }

    .login-logo {
      text-align: center;
      margin-bottom: 28px;
    }

    .login-logo__mark {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 52px;
      height: 52px;
      background: rgba(255,255,255,0.12);
      border-radius: 14px;
      margin-bottom: 10px;
      color: #ffffff;
    }

    .login-logo__mark svg {
      width: 28px;
      height: 28px;
    }

    .login-logo__name {
      font-size: 1.6rem;
      font-weight: 800;
      color: #ffffff !important;
      letter-spacing: 2px;
    }

    .login-logo__sub {
      font-size: 0.82rem;
      color: rgba(255,255,255,0.65) !important;
      margin-top: 2px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-label {
      display: block;
      font-size: 0.82rem;
      font-weight: 500;
      color: rgba(255,255,255,0.85) !important;
      margin-bottom: 6px;
    }

    .form-input {
      width: 100%;
      padding: 10px 14px;
      background: rgba(255, 255, 255, 0.10) !important;
      border: 1px solid rgba(255, 255, 255, 0.22) !important;
      border-radius: 8px;
      color: #ffffff !important;
      font-size: 0.92rem;
      font-family: 'Poppins', sans-serif;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }

    .form-input::placeholder {
      color: rgba(255,255,255,0.40) !important;
    }

    .form-input:focus {
      background: rgba(255, 255, 255, 0.18) !important;
      border-color: rgba(255, 255, 255, 0.45) !important;
    }

    .pw-wrap {
      position: relative;
    }

    .pw-toggle {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: rgba(255,255,255,0.55);
      padding: 4px;
      display: flex;
      align-items: center;
    }

    .pw-toggle svg {
      width: 18px;
      height: 18px;
    }

    .btn--primary {
      width: 100%;
      padding: 11px;
      background: #2563eb;
      color: #ffffff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      font-family: 'Poppins', sans-serif;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s, transform 0.1s;
      letter-spacing: 0.3px;
    }

    .btn--primary:hover {
      background: #1d4ed8;
      transform: translateY(-1px);
    }

    .btn--primary:active {
      transform: translateY(0);
    }

    .login-portal-link {
      text-align: center;
      margin-top: 18px;
      font-size: 0.82rem;
    }

    .login-portal-link a {
      color: rgba(255,255,255,0.65) !important;
      text-decoration: none;
      transition: color 0.2s;
    }

    .login-portal-link a:hover {
      color: #ffffff !important;
    }

    .alert {
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.83rem;
      margin-bottom: 16px;
    }

    .alert--info {
      background: rgba(59, 130, 246, 0.20) !important;
      border: 1px solid rgba(59, 130, 246, 0.35) !important;
      color: #93c5fd !important;
    }

    .alert--danger {
      background: rgba(239, 68, 68, 0.20) !important;
      border: 1px solid rgba(239, 68, 68, 0.35) !important;
      color: #fca5a5 !important;
    }
  </style>
</head>
<body class="login-body">
  <div class="login-bg" aria-hidden="true">
    <img src="https://images.unsplash.com/photo-1534438327276-14e5300c3a48?w=1920&q=100&fit=crop" alt="" class="active">
    <img src="https://images.unsplash.com/photo-1571902943202-507ec2618e8f?w=1920&q=100&fit=crop" alt="">
    <img src="https://images.unsplash.com/photo-1583454110551-21f2fa2afe61?w=1920&q=100&fit=crop" alt="">
    <img src="https://images.unsplash.com/photo-1517836357463-d25dfeac3438?w=1920&q=100&fit=crop" alt="">
    <img src="https://images.unsplash.com/photo-1605296867304-46d5465a13f1?w=1920&q=100&fit=crop" alt="">
    <div class="login-bg-overlay"></div>
  </div>

  <main class="login-container" aria-labelledby="admin-title">
    <section class="login-card">
      <div class="login-logo">
        <span class="login-logo__mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6 7v10" />
            <path d="M18 7v10" />
            <path d="M3 9v6" />
            <path d="M21 9v6" />
            <path d="M6 12h12" />
          </svg>
        </span>
        <h1 class="login-logo__name" id="admin-title">OLYMPIADS</h1>
        <p class="login-logo__sub">Admin Panel</p>
      </div>

      {% if request.session.session_timed_out %}
        <div class="alert alert--info" role="alert">Your session expired due to inactivity. Please log in again.</div>
      {% endif %}

      {% if error %}
        <div class="alert alert--danger" role="alert">{{ error }}</div>
      {% endif %}

      <form method="post" novalidate>
        {% csrf_token %}
        <div class="form-group">
          <label for="email" class="form-label">Email Address</label>
          <input type="email" id="email" name="email" class="form-input" placeholder="your@gmail.com" autocomplete="email" required>
        </div>
        <div class="form-group">
          <label for="password" class="form-label">Password</label>
          <div class="pw-wrap">
            <input type="password" id="password" name="password" class="form-input" placeholder="Password" autocomplete="current-password" required>
            <button type="button" class="pw-toggle" onclick="togglePw('password',this)" aria-label="Toggle password visibility">
              <svg class="eye-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg class="eye-off-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
          </div>
        </div>
        <button type="submit" class="btn btn--primary btn--full">Sign In</button>
      </form>
      <p class="login-portal-link">
        <a href="{% url 'members:portal_login' %}">Go to Member Portal</a>
      </p>
    </section>
  </main>

  <script src="{% static 'js/main.js' %}"></script>
  <script>
    (function () {
      var imgs = document.querySelectorAll('.login-bg img');
      var current = 0;
      setInterval(function () {
        imgs[current].classList.remove('active');
        current = (current + 1) % imgs.length;
        imgs[current].classList.add('active');
      }, 5000);
    })();
  </script>
</body>
</html>
