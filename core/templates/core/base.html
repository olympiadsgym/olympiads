<!DOCTYPE html>
<html lang="en" data-theme="">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>{% block title %}OLYMPIADS Admin{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/main.css' %}">
  <script>(function(){var t=localStorage.getItem('olympiads_theme')||'';document.documentElement.setAttribute('data-theme',t);})();</script>
</head>
<body class="admin-body">

  <header class="top-bar">
    <span class="top-bar__brand">OLYMPIADS</span>
    <div class="top-bar__right">
      <button class="menu-btn" id="menuBtn" aria-label="Open menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <div class="menu-overlay" id="menuOverlay"></div>

  <nav class="menu-drawer" id="menuDrawer" aria-label="Admin menu">
    <div class="menu-drawer__header">
      <span class="menu-drawer__title">Menu</span>
      <button class="menu-close" id="menuClose" aria-label="Close menu">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="menu-drawer__body">
      <button class="menu-item dark-toggle" aria-label="Toggle dark mode" type="button">
        <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg class="icon-sun"  xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        Theme
      </button>
      <div class="menu-divider"></div>
      <a href="{% url 'core:announcements' %}" class="menu-item {% block menu_announce %}{% endblock %}">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 17H2a3 3 0 0 0 3-3V9a7 7 0 0 1 14 0v5a3 3 0 0 0 3 3zm-8.27 4a2 2 0 0 1-3.46 0"/></svg>
        Announcements
      </a>
      <div class="menu-divider"></div>
      <a href="{% url 'members:register' %}" class="menu-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Register New Member
      </a>
      <div class="menu-divider"></div>
    </div>
    <div class="menu-drawer__footer">
      <a href="{% url 'core:logout' %}" class="menu-logout">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Logout
      </a>
    </div>
  </nav>

  {% if messages %}
    <div class="flash-messages">
      {% for message in messages %}
        <div class="flash flash--{{ message.tags }}">{{ message }}</div>
      {% endfor %}
    </div>
  {% endif %}

  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

  <nav class="bottom-nav" aria-label="Admin navigation">
    <a href="{% url 'core:dashboard' %}" class="bottom-nav__tab {% block nav_home %}{% endblock %}" aria-label="Dashboard">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      <span>Home</span>
    </a>
    <a href="{% url 'members:member_list' %}" class="bottom-nav__tab {% block nav_members %}{% endblock %}" aria-label="Members">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      <span>Members</span>
    </a>
    <a href="{% url 'core:checkin' %}" class="bottom-nav__tab {% block nav_checkin %}{% endblock %}" aria-label="Check-In">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>
      <span>Check-in</span>
    </a>
  </nav>

  <!-- Custom Confirmation Modal -->
  <div class="modal-overlay" id="confirmModal">
    <div class="modal">
      <div class="modal-title" id="modalTitle">Confirm Action</div>
      <div class="modal-message" id="modalMessage">Are you sure?</div>
      <div class="modal-actions">
        <button class="modal-btn modal-btn--confirm" id="modalConfirm">Confirm</button>
        <button class="modal-btn modal-btn--cancel" id="modalCancel">Cancel</button>
      </div>
    </div>
  </div>

  <script src="{% static 'js/main.js' %}"></script>
</body>
</html>
