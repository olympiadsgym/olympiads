<!DOCTYPE html>
<html lang="en" data-theme="">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>OLYMPIADS - Forgot Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/main.css' %}">
  <script>(function(){var t=localStorage.getItem('olympiads_theme')||'';document.documentElement.setAttribute('data-theme',t);})();</script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; }

    .login-body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      position: relative;
      font-family: 'Poppins', sans-serif;
    }

    .login-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    .login-bg img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      opacity: 0;
      transition: opacity 1.4s ease-in-out;
      will-change: opacity;
    }

    .login-bg img.active { opacity: 1; }

    .login-bg-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      z-index: 1;
    }

    .login-container {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 420px;
    }

    .login-card {
      background: rgba(10, 20, 40, 0.60) !important;
      backdrop-filter: blur(20px) saturate(160%) !important;
      -webkit-backdrop-filter: blur(20px) saturate(160%) !important;
      border: 1px solid rgba(255, 255, 255, 0.15) !important;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.60) !important;
      border-radius: 16px !important;
      padding: 40px 36px !important;
    }

    .login-logo {
      text-align: center;
      margin-bottom: 28px;
    }

    .login-logo__mark {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 52px;
      height: 52px;
      background: rgba(255,255,255,0.12);
      border-radius: 14px;
      margin-bottom: 10px;
      color: #ffffff;
    }

    .login-logo__mark svg { width: 28px; height: 28px; }

    .login-logo__name {
      font-size: 1.6rem;
      font-weight: 800;
      color: #ffffff !important;
      letter-spacing: 2px;
    }

    .page-subtitle {
      text-align: center;
      font-size: 0.88rem;
      color: rgba(255,255,255,0.60);
      margin-bottom: 24px;
      line-height: 1.5;
    }

    .form-group { margin-bottom: 16px; }

    .form-label {
      display: block;
      font-size: 0.82rem;
      font-weight: 500;
      color: rgba(255,255,255,0.85) !important;
      margin-bottom: 6px;
    }

    .form-input,
    .login-card input[type="email"],
    .login-card input[type="text"] {
      width: 100%;
      padding: 10px 14px;
      background: rgba(255, 255, 255, 0.10) !important;
      border: 1px solid rgba(255, 255, 255, 0.22) !important;
      border-radius: 8px;
      color: #ffffff !important;
      font-size: 0.92rem;
      font-family: 'Poppins', sans-serif;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
      -webkit-text-fill-color: #ffffff !important;
    }

    .login-card input:-webkit-autofill,
    .login-card input:-webkit-autofill:hover,
    .login-card input:-webkit-autofill:focus {
      -webkit-box-shadow: 0 0 0px 1000px rgba(10, 30, 60, 0.85) inset !important;
      -webkit-text-fill-color: #ffffff !important;
      border: 1px solid rgba(255, 255, 255, 0.22) !important;
      transition: background-color 5000s ease-in-out 0s;
    }

    .form-input::placeholder,
    .login-card input::placeholder {
      color: rgba(255,255,255,0.40) !important;
    }

    .form-input:focus,
    .login-card input:focus {
      background: rgba(255, 255, 255, 0.18) !important;
      border-color: rgba(255, 255, 255, 0.45) !important;
    }

    .btn--primary {
      width: 100%;
      padding: 11px;
      background: #2563eb;
      color: #ffffff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      font-family: 'Poppins', sans-serif;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s, transform 0.1s;
      letter-spacing: 0.3px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn--primary:hover { background: #1d4ed8; transform: translateY(-1px); }
    .btn--primary:active { transform: translateY(0); }
    .btn--primary:disabled { opacity: 0.8; cursor: not-allowed; transform: none; }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .login-spinner {
      display: none;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    .alert {
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.83rem;
      margin-bottom: 16px;
    }

    .alert--danger {
      background: rgba(239, 68, 68, 0.20) !important;
      border: 1px solid rgba(239, 68, 68, 0.35) !important;
      color: #fca5a5 !important;
    }

    .alert--success {
      background: rgba(34, 197, 94, 0.18) !important;
      border: 1px solid rgba(34, 197, 94, 0.35) !important;
      color: #86efac !important;
      text-align: center;
      padding: 24px 20px;
      border-radius: 10px;
      line-height: 1.7;
    }

    .success-icon {
      font-size: 2.2rem;
      display: block;
      margin-bottom: 10px;
    }

    .back-link {
      text-align: center;
      margin-top: 20px;
    }

    .back-link a {
      font-size: 0.82rem;
      color: rgba(255,255,255,0.55);
      text-decoration: none;
      transition: color 0.2s;
    }

    .back-link a:hover { color: rgba(255,255,255,0.9); }
  </style>
</head>
<body class="login-body">
  <div class="login-bg" aria-hidden="true">
    <img src="https://images.unsplash.com/photo-1534438327276-14e5300c3a48?w=1920&q=100&fit=crop" alt="" class="active">
    <img src="https://images.unsplash.com/photo-1571902943202-507ec2618e8f?w=1920&q=100&fit=crop" alt="">
    <img src="https://images.unsplash.com/photo-1583454110551-21f2fa2afe61?w=1920&q=100&fit=crop" alt="">
    <img src="https://images.unsplash.com/photo-1517836357463-d25dfeac3438?w=1920&q=100&fit=crop" alt="">
    <img src="https://images.unsplash.com/photo-1605296867304-46d5465a13f1?w=1920&q=100&fit=crop" alt="">
    <div class="login-bg-overlay"></div>
  </div>

  <main class="login-container" aria-labelledby="fp-title">
    <section class="login-card">

      <div class="login-logo">
        <span class="login-logo__mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6 7v10" /><path d="M18 7v10" /><path d="M3 9v6" />
            <path d="M21 9v6" /><path d="M6 12h12" />
          </svg>
        </span>
        <h1 class="login-logo__name" id="fp-title">OLYMPIADS</h1>
      </div>

      {% if sent %}
        <!-- ── Success state ── -->
        <div class="alert--success" role="alert">
          <span class="success-icon">✅</span>
          <strong>Check your inbox!</strong><br>
          Sent Success!
        </div>
        <div class="back-link">
          <a href="{% url 'members:portal_login' %}">← Back to Login</a>
        </div>

      {% else %}
        <!-- ── Request form ── -->
        {% if error %}
          <div class="alert alert--danger" role="alert">{{ error }}</div>
        {% endif %}

        <form method="post" novalidate id="fpForm">
          {% csrf_token %}
          <div class="form-group">
            <label for="email" class="form-label">Registered Email Address</label>
            <input type="email" id="email" name="email" class="form-input"
                   placeholder="Enter your email address"
                   autocomplete="email" required>
          </div>
          <button type="submit" class="btn--primary" id="fpBtn">
            <span id="fpBtnText">Send New Password</span>
            <svg id="fpSpinner" class="login-spinner" xmlns="http://www.w3.org/2000/svg"
                 width="16" height="16" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
              <path d="M12 2a10 10 0 0 1 10 10" />
            </svg>
          </button>
        </form>

        <div class="back-link">
          <a href="{% url 'members:portal_login' %}">← Back to Login</a>
        </div>
      {% endif %}

    </section>
  </main>

  <script src="{% static 'js/main.js' %}"></script>
  <script>
    // Background slideshow
    (function () {
      var imgs = document.querySelectorAll('.login-bg img');
      var current = 0;
      setInterval(function () {
        imgs[current].classList.remove('active');
        current = (current + 1) % imgs.length;
        imgs[current].classList.add('active');
      }, 5000);
    })();

    // Spinner on submit
    var fpForm = document.getElementById('fpForm');
    if (fpForm) {
      fpForm.addEventListener('submit', function () {
        var btn = document.getElementById('fpBtn');
        document.getElementById('fpBtnText').textContent = 'Sending…';
        document.getElementById('fpSpinner').style.display = 'block';
        btn.disabled = true;
      });
    }
  </script>
</body>
</html>
