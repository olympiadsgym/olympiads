<!DOCTYPE html>
<html lang="en" data-theme="">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>OLYMPIADS - Member Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/main.css' %}">
  <script>(function(){var t=localStorage.getItem('olympiads_theme')||'';document.documentElement.setAttribute('data-theme',t);})();</script>
  <style>
    .login-card {
      background: rgba(255, 255, 255, 0.10) !important;
      backdrop-filter: blur(16px) saturate(180%);
      -webkit-backdrop-filter: blur(16px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.20) !important;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35) !important;
    }

    .login-logo__name,
    .login-logo__sub,
    .form-label,
    .login-portal-link a {
      color: #ffffff !important;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.4);
    }

    .login-logo__mark {
      color: #ffffff !important;
    }

    .form-input {
      background: rgba(255, 255, 255, 0.15) !important;
      border: 1px solid rgba(255, 255, 255, 0.25) !important;
      color: #ffffff !important;
    }

    .form-input::placeholder {
      color: rgba(255, 255, 255, 0.55) !important;
    }

    .form-input:focus {
      background: rgba(255, 255, 255, 0.22) !important;
      outline: none;
      border-color: rgba(255, 255, 255, 0.45) !important;
    }

    .flash--info,
    .flash--error {
      background: rgba(255, 255, 255, 0.12) !important;
      border: 1px solid rgba(255, 255, 255, 0.20) !important;
      color: #ffffff !important;
    }
  </style>
</head>
<body class="login-body">
  <div class="login-bg" aria-hidden="true">
    <img src="https://images.unsplash.com/photo-1534438327276-14e5300c3a48?w=1920&q=100&fit=crop" alt="" class="active">
    <img src="https://images.unsplash.com/photo-1571902943202-507ec2618e8f?w=1920&q=100&fit=crop" alt="">
    <img src="https://images.unsplash.com/photo-1583454110551-21f2fa2afe61?w=1920&q=100&fit=crop" alt="">
    <img src="https://images.unsplash.com/photo-1517836357463-d25dfeac3438?w=1920&q=100&fit=crop" alt="">
    <img src="https://images.unsplash.com/photo-1605296867304-46d5465a13f1?w=1920&q=100&fit=crop" alt="">
    <div class="login-bg-overlay"></div>
  </div>
  <main class="login-container" aria-labelledby="portal-title">
    <section class="login-card">
      <div class="login-logo">
        <span class="login-logo__mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6 7v10" />
            <path d="M18 7v10" />
            <path d="M3 9v6" />
            <path d="M21 9v6" />
            <path d="M6 12h12" />
          </svg>
        </span>
        <h1 class="login-logo__name" id="portal-title">OLYMPIADS</h1>
        <p class="login-logo__sub">Member Portal</p>
      </div>

      {% if request.session.session_timed_out %}
        <div class="flash flash--info alert alert--info" role="alert">Your session expired due to inactivity. Please log in again.</div>
      {% endif %}

      {% if error %}
        <div class="flash flash--error alert alert--danger" role="alert">{{ error }}</div>
      {% endif %}

      <form method="post" novalidate>
        {% csrf_token %}
        <div class="form-group">
          <label for="email" class="form-label">Email Address</label>
          <input type="email" id="email" name="email" class="form-input" placeholder="you@example.com" autocomplete="email" required>
        </div>
        <div class="form-group">
          <label for="password" class="form-label">Password</label>
          <div class="pw-wrap">
            <input type="password" id="password" name="password" class="form-input" placeholder="Password" autocomplete="current-password" required>
            <button type="button" class="pw-toggle" onclick="togglePw('password',this)" aria-label="Toggle password visibility">
              <svg class="eye-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg class="eye-off-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
          </div>
        </div>
        <button type="submit" class="btn btn--primary btn--full">Sign In</button>
      </form>
    </section>
  </main>
  <script src="{% static 'js/main.js' %}"></script>
  <script>
    (function () {
      var imgs = document.querySelectorAll('.login-bg img');
      var current = 0;
      setInterval(function () {
        imgs[current].classList.remove('active');
        current = (current + 1) % imgs.length;
        imgs[current].classList.add('active');
      }, 5000);
    })();
  </script>
</body>
</html>
