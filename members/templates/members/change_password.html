<!DOCTYPE html>
<html lang="en" data-theme="">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Change Password - OLYMPIADS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/main.css' %}">
  <script>(function(){var t=localStorage.getItem('olympiads_theme')||'';document.documentElement.setAttribute('data-theme',t);})();</script>
</head>
<body class="portal-body">
  <header class="portal-header">
    <span class="portal-header__brand">OLYMPIADS</span>
    <div class="portal-header__actions">
      <a href="{% url 'members:portal_dashboard' %}" class="btn btn--ghost btn--sm" style="font-size:13px;">← Back</a>
    </div>
  </header>

  <main class="portal-main">
    <div class="page-header" style="margin-bottom:20px;">
      <h2 class="page-title">Change Password</h2>
    </div>

    {% if success %}
      <div class="card form-card">
        <div class="flash flash--success" role="alert" style="margin-bottom:20px;padding:14px 16px;border-radius:var(--radius);background:rgba(16,185,129,.12);color:#059669;font-weight:500;">
          ✅ Password changed successfully!
        </div>
        <a href="{% url 'members:portal_dashboard' %}" class="btn btn--primary" style="display:block;text-align:center;">
          Back to Dashboard
        </a>
      </div>
    {% else %}
      {% if error %}
        <div class="flash flash--error" role="alert" style="margin-bottom:16px;padding:14px 16px;border-radius:var(--radius);background:rgba(239,68,68,.1);color:#EF4444;font-weight:500;">
          ⚠️ {{ error }}
        </div>
      {% endif %}

      <div class="card form-card">
        <form method="post" novalidate>
          {% csrf_token %}
          <div class="form-group">
            <label class="form-label" for="current_password">Current Password</label>
            <input class="form-input" type="password" id="current_password" name="current_password"
                   required autocomplete="current-password">
          </div>
          <div class="form-group">
            <label class="form-label" for="new_password">New Password</label>
            <input class="form-input" type="password" id="new_password" name="new_password"
                   required autocomplete="new-password" minlength="8">
            <span class="form-hint">Minimum 8 characters.</span>
          </div>
          <div class="form-group">
            <label class="form-label" for="confirm_password">Confirm New Password</label>
            <input class="form-input" type="password" id="confirm_password" name="confirm_password"
                   required autocomplete="new-password">
          </div>
          <div class="form-actions">
            <button class="btn btn--primary" type="submit">Change Password</button>
            <a href="{% url 'members:portal_dashboard' %}" class="btn btn--ghost">Cancel</a>
          </div>
        </form>
      </div>
    {% endif %}
  </main>

  <script src="{% static 'js/main.js' %}"></script>
</body>
</html>
