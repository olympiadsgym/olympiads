<!DOCTYPE html>
<html lang="en" data-theme="">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Change Password - OLYMPIADS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/main.css' %}">
  <script>(function(){var t=localStorage.getItem('olympiads_theme')||'';document.documentElement.setAttribute('data-theme',t);})();</script>
</head>
<body class="login-body">
  <main class="login-container" aria-labelledby="change-pw-title">
    <section class="login-card">
      <div class="login-logo">
        <span class="login-logo__mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6 7v10" /><path d="M18 7v10" /><path d="M3 9v6" /><path d="M21 9v6" /><path d="M6 12h12" />
          </svg>
        </span>
        <h1 class="login-logo__name" id="change-pw-title">OLYMPIADS</h1>
        <p class="login-logo__sub">Change Password</p>
      </div>

      {% if success %}
        <div class="alert alert--success" role="alert">
          ✅ Password changed successfully!
        </div>
        <a href="{% url 'members:portal_dashboard' %}" class="btn btn--primary" style="display:block;text-align:center;margin-top:16px;">
          Back to Dashboard
        </a>
      {% else %}
        {% if error %}
          <div class="alert alert--error" role="alert">{{ error }}</div>
        {% endif %}

        <form method="post" novalidate>
          {% csrf_token %}
          <div class="form-group">
            <label class="form-label" for="current_password">Current Password</label>
            <input class="form-input" type="password" id="current_password" name="current_password" required autocomplete="current-password">
          </div>
          <div class="form-group">
            <label class="form-label" for="new_password">New Password</label>
            <input class="form-input" type="password" id="new_password" name="new_password" required autocomplete="new-password" minlength="8">
            <span class="form-hint">Minimum 8 characters</span>
          </div>
          <div class="form-group">
            <label class="form-label" for="confirm_password">Confirm New Password</label>
            <input class="form-input" type="password" id="confirm_password" name="confirm_password" required autocomplete="new-password">
          </div>
          <button class="btn btn--primary" type="submit" style="width:100%;margin-top:8px;">
            Change Password
          </button>
        </form>

        <a href="{% url 'members:portal_dashboard' %}" class="btn btn--ghost" style="display:block;text-align:center;margin-top:12px;">
          ← Back to Dashboard
        </a>
      {% endif %}
    </section>
  </main>
</body>
</html>
